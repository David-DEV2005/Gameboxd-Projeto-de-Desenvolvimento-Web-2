{% extends 'lobby/base.html' %}
{% block content %}
{% load static %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Avaliar: {{ jogo.titulo }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="nota" class="form-label">Sua Nota (1 a 5)</label>
                        <input type="number" class="form-control" id="nota" name="nota" min="1" max="5" step="0.5" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="comentario" class="form-label">Comentário</label>
                        <textarea class="form-control" id="comentario" name="comentario" rows="4" required></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'game_wall' jogo.id %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Publicar Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
