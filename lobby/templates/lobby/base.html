{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby de Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">🕹️ Gamerboxd</a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item me-3 mt-1">
                            <a class="nav-link text-warning fw-bold" href="{% url 'painel_notificacoes' %}">🔔 Notificações</a>
                        </li>
                        <li class="nav-item">
                            <span class="nav-link text-primary fw-bold">Olá, @{{ user.username }}</span>
                        </li>
                        <li class="nav-item ms-2">
                            <form method="POST" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-danger btn-sm mt-1">Sair</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Entrar</a>
                        </li>
                        <li class="nav-item ms-2">
                            <a class="btn btn-primary btn-sm mt-1" href="{% url 'register' %}">Cadastrar</a>
                        </li>
                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
