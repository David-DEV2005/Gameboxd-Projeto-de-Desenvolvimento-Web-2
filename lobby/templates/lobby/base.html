{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby de Jogos</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'lobby/images/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="{% static 'lobby/style.css' %}?v=6" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
        <a class="navbar-brand hover-neon-white" href="{% url 'index' %}">
            <img src="{% static 'lobby/images/logos.svg' %}" alt="Logo Gameboxd" height="60" class="d-inline-block align-text-top me-2">
        </a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-3 mt-1">
                        <a class="nav-link nav-offwhite hover-neon-white fw-bold" href="{% url 'noticias' %}"> Notícias</a>
                    </li>

                    <li class="nav-item me-3 mt-1">
                        <a class="nav-link nav-offwhite hover-ps-green fw-bold" href="{% url 'wall_rating' %}"> Feed </a>
                    </li>

                    <li class="nav-item me-3 mt-1">
                        <a class="nav-link nav-offwhite hover-ps-pink fw-bold" href="{% url 'mural_chatos' %}"> Chat...os</a>
                    </li>
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item me-3 mt-1">
                            <a class="nav-link nav-offwhite hover-ps-red fw-bold" href="{% url 'painel_notificacoes' %}"> Notificações</a>
                        </li>

                        <li class="nav-item me-3 mt-1">
                            <a class="nav-link nav-offwhite hover-ps-blue fw-bold" href="{% url 'my_profile' %}"> Meu Perfil</a>
                        </li>

                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Entrar</a>
                        </li>
                        <li class="nav-item ms-2">
                            <a class="btn btn-primary btn-sm mt-1" href="{% url 'register' %}">Cadastrar</a>
                        </li>
                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll('.render-estrelas').forEach(function(el) {

                let notaCrua = el.getAttribute('data-nota') || "0";
                notaCrua = notaCrua.replace(/[^0-9,.]/g, '').replace(',', '.');
                let nota = parseFloat(notaCrua);
                
                if (isNaN(nota)) { nota = 0; }

                let porcentagem = (nota / 5) * 100;

                el.innerHTML = `
                    <div style="display: inline-block; position: relative; color: #2B2F44; font-size: 1.3rem; letter-spacing: 2px;" title="Nota: ${nota.toFixed(1)}">
                        ★★★★★
                        <div style="position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; color: #E2E2E2; width: ${porcentagem}%;">
                            ★★★★★
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
