{% extends 'lobby/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Entrar no Lobby</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <p>Não tem uma conta? <a href="{% url 'register' %}">Cadastre-se aqui</a></p>
                    <p><a href="{% url 'password_reset' %}">Esqueceu a senha?</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
