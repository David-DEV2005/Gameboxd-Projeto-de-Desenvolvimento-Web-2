{% extends 'lobby/base.html' %}
{% block content %}
{% load static %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-primary">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Criar Grupo para: {{ jogo.titulo }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome do Grupo</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Rush Platina, Tryhards, etc..." required>
                    </div>

                    <div class="mb-3">
                        <label for="vagas_disponiveis" class="form-label">Vagas Disponíveis</label>
                        <input type="number" class="form-control" id="vagas_disponiveis" name="vagas_disponiveis" min="1" max="99" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Estilo de Jogo</label>
                        <select name="estilo" class="form-select" required>
                            <option value="Casual" selected>Casual (Só por diversão)</option>
                            <option value="Competitivo">Competitivo (Tryhard/Ranked)</option>
                            <option value="Campanha">Foco em Missões / Campanha</option>
                            <option value="Iniciantes">Aceita Iniciantes (Mentoria)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição (opcional)</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Conte um pouco sobre o grupo: horários, nível de experiência, etc."></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'game_wall' jogo.id %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Abrir Vagas</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
