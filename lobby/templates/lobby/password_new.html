{% extends 'lobby/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-secondary bg-dark text-white">
            <div class="card-body p-4">
                <h4 class="card-title fw-bold text-center mb-4">Criar Nova Senha 🔑</h4>
                
                {% if validlink %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="text-light">
                            {{ form.as_p }}
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold mt-3">Confirmar Nova Senha</button>
                    </form>
                {% else %}
                    <div class="alert alert-danger" role="alert">
                        <strong>Link inválido!</strong> Este link de recuperação já foi usado ou expirou. Por favor, solicite um novo.
                    </div>
                    <a href="{% url 'password_reset' %}" class="btn btn-outline-light w-100 mt-3">Solicitar novo link</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
