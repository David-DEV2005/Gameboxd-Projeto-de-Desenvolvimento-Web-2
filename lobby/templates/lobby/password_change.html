{% extends 'lobby/base.html' %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-lock me-2"></i> Alterar Senha</h4>
            </div>
            <div class="card-body">
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            
                            {{ field }}
                            
                            {% if field.errors %}
                                <div class="text-danger mt-1 small fw-bold">
                                    {{ field.errors.0 }}
                                </div>
                            {% endif %}
                            
                            {% if field.help_text %}
                                <small class="text-muted d-block mt-1">{{ field.help_text }}</small>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'my_profile' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success fw-bold">Atualizar Senha</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll("input");
        inputs.forEach(function(input) {
            if (input.type !== "hidden" && input.type !== "submit") {
                input.classList.add("form-control");
            }
        });
    });
</script>
{% endblock %}
